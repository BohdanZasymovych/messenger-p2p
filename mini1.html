<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Security App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, black, #242D6F);
      color: white;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .navbar {
      position: absolute;
      top: 10px;
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 10px 15px;
      gap: 20px;
      font-size: 16px;
    }
    .navbar img {
      position: absolute;
      left: 15px;
      top: 5px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }
    .navbar span {
      position: relative;
      top: -5px;
    }
    .login-container {
      font-size: 18px;
      font-style: italic;
      width: 100%;
      max-width: 400px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .login-form input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-align: center;
    }
    .continue-button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: #1E90FF;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: white;
      margin: 0 10px;
    }
    .social-buttons button {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <img src="photo_2024-12-02_10-34-48.jpg" alt="Profile Picture">
    <span>Log in</span>
  </div>

  <div class="login-container">
    <p>Welcome back to the world <br> of security</p>
    <form class="login-form">
      <input type="text" name="nickname" placeholder="Enter nickname">
      <input type="email" name="email" placeholder="Enter email">
      <input type="password" name="password" placeholder="Enter password">
      <button class="continue-button" type="submit">Continue</button>
    </form>

    <div class="divider">OR</div>
    <div class="social-buttons">
      <button>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/768px-Google_%22G%22_logo.svg.png" width="20">
        Enter with Google
      </button>
      <button>
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="20">
        Enter with GitHub
      </button>
      <button>📞 Enter with number</button>
    </div>
  </div>

  <!-- ⬇️ Підключення login.js -->
  <script src="login.js"></script>
</body>
</html>
