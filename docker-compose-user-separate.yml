# docker-compose-user-separate.yml
services:
  user_database:
    image: postgres:14
    container_name: messenger_user_db_${USER_NUMBER}
    environment:
      POSTGRES_USER: "${POSTGRES_USER_CLIENT}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD_CLIENT}"
      POSTGRES_DB: "${POSTGRES_DB_CLIENT}"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_user:/var/lib/postgresql/data
      - ./db_init_user.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - messenger_network

  messenger:
    build:
      context: .
      dockerfile: messenger.Dockerfile
    container_name: messenger_app_${USER_NUMBER}
    stdin_open: true
    tty: true
    environment:
      DATABASE_URL_CLIENT: "${DATABASE_URL_CLIENT}"
      USER_NUMBER: "${USER_NUMBER}"
    depends_on:
      - user_database
    volumes:
      - .:/app
      - encryption_keys:/app/keys
    working_dir: /app
    command: sh -c "python generate_keys.py && python messenger.py"
    networks:
      - messenger_network

volumes:
  postgres_data_user:
    name: postgres_data_user_${USER_NUMBER}
  encryption_keys:
    name: encryption_keys_${USER_NUMBER}

networks:
  messenger_network:
    external: true