<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat UI</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div class="sidebar">
    <h2>Chats</h2>
    <div class="create-chat">
      <input type="text" id="newChatUserId" placeholder="Enter user ID..." />
      <button onclick="createChat()">➕ Add Chat</button>
    </div>
    <ul class="chat-list" id="chatList"></ul>
  </div>

  <div class="chat-window">
    <div class="chat-header">
      <img src="photos/budanov.jpg" alt="Contact">
      <div class="contact-info" id="chatWith">Select a chat</div>
      <div class="buttons">
        <button>📞</button>
        <button>⋮</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="messageInput" placeholder="Type smth..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <a href="map.html" class="map-button">🌍 Open Map</a>
  <script src="chat.js"></script>
</body>
</html>
