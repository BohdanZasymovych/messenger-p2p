# version: '3.8'

services:
  server_database:
    image: postgres:14
    container_name: messenger_server_db
    env_file:
      - .env_server
    environment:
      POSTGRES_USER: "${POSTGRES_USER_SERVER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD_SERVER}"
      POSTGRES_DB: "${POSTGRES_DB_SERVER}"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_server:/var/lib/postgresql/data
      - ./db_init_server.sql:/docker-entrypoint-initdb.d/init.sql:ro  # Databese init script, creates messages table
    networks:
      - messenger_network


  server:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: messenger_server
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL_SERVER}"
    depends_on:
      - server_database
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - messenger_network


volumes:
  postgres_data_server:

networks:
  messenger_network:
    external: true