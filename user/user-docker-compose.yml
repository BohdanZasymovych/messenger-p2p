# version: '3.8'

services:
  user_database:
    image: postgres:14
    container_name: messenger_user_db
    # env_file:
    #   - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USER_CLIENT}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD_CLIENT}"
      POSTGRES_DB: "${POSTGRES_DB_CLIENT}"
      DATABASE_URL_CLIENT: "${DATABASE_URL_CLIENT}"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_user:/var/lib/postgresql/data
      - ./db_init_user.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - messenger_network

  messenger:
    build:
      context: .
      dockerfile: messenger.Dockerfile
    container_name: messenger_app
    # env_file:
    #   - .env
    stdin_open: true
    tty: true
    environment:
      DATABASE_URL_CLIENT: "${DATABASE_URL_CLIENT}"
    ports:
      - "8000:8000"
    depends_on:
      - user_database
    volumes:
      - .:/app
      - encryption_keys:/app/keys
      - message_data:/app/data 
    working_dir: /app
    command: sh -c "python generate_keys.py && chmod +x start.sh && ./start.sh"
    networks:
      - messenger_network

volumes:
  postgres_data_user:
  encryption_keys:
  message_data:

networks:
  messenger_network:
    external: true