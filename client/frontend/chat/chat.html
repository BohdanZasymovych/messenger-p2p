<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat UI</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <div class="sidebar">
    <h2>Chats</h2>
    <div class="create-chat">
      <input type="text" id="newChatUserId" placeholder="Enter user ID..." />
      <button onclick="createChat()">➕ Add Chat</button>
    </div>
    <ul class="chat-list" id="chatList"></ul>
  </div>

  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <img src="photos/budanov.jpg" alt="Contact">
      <div class="contact-info" id="chatWith">Select a chat</div>
      <div class="buttons">
        <button>📞</button>
        <button class="map-button" onclick="window.location.href='../map/map.html'">🌍 Map</button>
        <button>⋮</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <!-- Якщо чат не вибрано, тут буде пусто -->
    </div>

    <div class="input-bar" id="inputBar">
      <input type="text" id="messageInput" placeholder="Type something..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="chat.js"></script>

  <div id="notification" class="notification"></div>
</body>
</html>
